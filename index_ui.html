<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>装备环绕UI原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
}

.game-container {
  position: relative;
  width: 375px;
  height: 667px;
  background: linear-gradient(180deg, #16213e 0%, #0f3460 50%, #1a1a2e 100%);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(79, 172, 254, 0.3);
}

/* === 角色区域 === */
.character-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.character-body {
  width: 120px;
  height: 160px;
  position: relative;
  margin-top: 20px;
}

.character-body img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  /* 原地抖动动画 */
  animation: characterIdle 1.2s ease-in-out infinite;
}

@keyframes characterIdle {
  0%, 100% { transform: translateY(0px) scale(1); }
  25% { transform: translateY(-4px) scale(1.02); }
  50% { transform: translateY(0px) scale(1); }
  75% { transform: translateY(3px) scale(0.98); }
}

/* 名字和职业标签 */
.character-info {
  text-align: center;
  margin-top: 8px;
}
.character-name {
  color: #ffd700;
  font-size: 14px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
}
.character-class {
  color: #7ec8e3;
  font-size: 11px;
  margin-top: 2px;
}

/* 角色脚下光圈 */
.character-glow {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 20px;
  background: radial-gradient(ellipse, rgba(79,172,254,0.4) 0%, transparent 70%);
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
}

/* === 装备槽位环绕系统 === */
.equip-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  height: 340px;
}

.equip-slot {
  position: absolute;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.equip-slot:hover {
  transform: scale(1.15);
  border-color: #ffd700;
  background: rgba(255,215,0,0.15);
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
  z-index: 10;
}

.equip-slot.equipped {
  border-color: #4facfe;
  background: rgba(79,172,254,0.15);
}

.equip-slot .slot-icon {
  font-size: 22px;
  filter: drop-shadow(0 0 3px rgba(255,255,255,0.5));
}

.equip-slot .slot-label {
  position: absolute;
  bottom: -18px;
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
}

/* 槽位位置（围绕角色排列） */
.slot-head     { top: 0;    left: 50%; transform: translateX(-50%); }
.slot-helmet   { top: 8px;  left: 50%; transform: translateX(-50%); }

.slot-weapon   { top: 50%;  right: -24px; transform: translateY(-50%); }
.slot-offhand { top: 50%;  left: -24px;  transform: translateY(-50%); }

.slot-chest   { bottom: 60px; left: 50%;  transform: translateX(-50%); }
.slot-cloak   { bottom: 30px; left: 50%;  transform: translateX(-50%); }

.slot-gloves  { top: 35%;   right: 10px; }
.slot-boots   { bottom: 0;  left: 50%;    transform: translateX(-50%); }
.slot-ring    { top: 35%;   left: 10px; }

/* === 弹出装备面板 === */
.equip-popup {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%) scale(0.8);
  width: 320px;
  background: rgba(10, 15, 30, 0.95);
  border: 1px solid rgba(79, 172, 254, 0.3);
  border-radius: 16px;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s ease;
  z-index: 100;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
}

.equip-popup.active {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) scale(1);
}

.equip-popup-title {
  color: #4facfe;
  font-size: 12px;
  margin-bottom: 10px;
  text-align: center;
}

.equip-list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.equip-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.equip-item:hover {
  border-color: #4facfe;
  background: rgba(79,172,254,0.1);
}

.equip-item-icon {
  font-size: 24px;
  display: block;
  margin-bottom: 4px;
}

.equip-item-name {
  font-size: 10px;
  color: #ccc;
}

.equip-item.selected {
  border-color: #ffd700;
  background: rgba(255,215,0,0.1);
}

/* 关闭按钮 */
.popup-close {
  position: absolute;
  top: 8px;
  right: 10px;
  color: rgba(255,255,255,0.4);
  font-size: 16px;
  cursor: pointer;
}
.popup-close:hover { color: #fff; }

/* === 顶部状态栏 === */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
  display: flex;
  align-items: center;
  padding: 0 16px;
  justify-content: space-between;
}

.back-btn {
  color: #fff;
  font-size: 20px;
  cursor: pointer;
}

.top-title {
  color: rgba(255,255,255,0.7);
  font-size: 13px;
}

/* === 角色选择切换 === */
.char-switcher {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
}

.char-tab {
  padding: 6px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}

.char-tab.active {
  background: rgba(79,172,254,0.2);
  border-color: #4facfe;
  color: #4facfe;
}

/* 抖动效果测试按钮 */
.test-btn {
  position: absolute;
  top: 55px;
  right: 12px;
  padding: 5px 10px;
  background: rgba(255,215,0,0.15);
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 8px;
  color: #ffd700;
  font-size: 10px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="game-container">

  <!-- 顶部状态栏 -->
  <div class="top-bar">
    <div class="back-btn">←</div>
    <div class="top-title">角色装备</div>
    <div style="width:20px"></div>
  </div>

  <!-- 角色区域 -->
  <div class="character-area">
    <div class="character-info">
      <div class="character-name">小杰 INTJ</div>
      <div class="character-class">Lv.8 战士</div>
    </div>
    <div class="character-body">
      <!-- 角色立绘区域 -->
      <img id="charImage" src="mbti_intj_boy_child.png" alt="角色立绘" 
           onerror="this.style.display='none'">
      <div class="character-glow"></div>
    </div>
  </div>

  <!-- 装备环绕环 -->
  <div class="equip-ring" id="equipRing">
    <!-- 头部槽位 -->
    <div class="equip-slot slot-head" data-slot="head" data-label="头部">
      <span class="slot-icon">🪖</span>
      <span class="slot-label">头部</span>
    </div>
    <!-- 武器槽位 -->
    <div class="equip-slot slot-weapon equipped" data-slot="weapon" data-label="武器">
      <span class="slot-icon">⚔️</span>
      <span class="slot-label">武器</span>
    </div>
    <!-- 副手槽位 -->
    <div class="equip-slot slot-offhand equipped" data-slot="offhand" data-label="副手">
      <span class="slot-icon">🛡️</span>
      <span class="slot-label">副手</span>
    </div>
    <!-- 胸甲槽位 -->
    <div class="equip-slot slot-chest equipped" data-slot="chest" data-label="胸甲">
      <span class="slot-icon">🎽</span>
      <span class="slot-label">胸甲</span>
    </div>
    <!-- 披风槽位 -->
    <div class="equip-slot slot-cloak" data-slot="cloak" data-label="披风">
      <span class="slot-icon">🧣</span>
      <span class="slot-label">披风</span>
    </div>
    <!-- 手套槽位 -->
    <div class="equip-slot slot-gloves" data-slot="gloves" data-label="手套">
      <span class="slot-icon">🧤</span>
      <span class="slot-label">手套</span>
    </div>
    <!-- 鞋子槽位 -->
    <div class="equip-slot slot-boots" data-slot="boots" data-label="鞋子">
      <span class="slot-icon">👟</span>
      <span class="slot-label">鞋子</span>
    </div>
    <!-- 戒指槽位 -->
    <div class="equip-slot slot-ring" data-slot="ring" data-label="戒指">
      <span class="slot-icon">💍</span>
      <span class="slot-label">戒指</span>
    </div>
  </div>

  <!-- 装备弹出面板 -->
  <div class="equip-popup" id="equipPopup">
    <div class="popup-close" id="popupClose">✕</div>
    <div class="equip-popup-title" id="popupTitle">选择头部装备</div>
    <div class="equip-list" id="equipList">
      <!-- 动态生成 -->
    </div>
  </div>

  <!-- 角色切换 -->
  <div class="char-switcher">
    <div class="char-tab active" data-char="intj">INTJ</div>
    <div class="char-tab" data-char="enfp">ENFP</div>
    <div class="char-tab" data-char="istp">ISTP</div>
    <div class="char-tab" data-char="esfj">ESFJ</div>
  </div>

</div>

<script>
// 装备数据
const equipData = {
  head: [
    { icon: '🪖', name: '战士头盔' },
    { icon: '👑', name: '皇家头盔' },
    { icon: '🎩', name: '魔法帽' },
  ],
  weapon: [
    { icon: '⚔️', name: '短剑' },
    { icon: '🗡️', name: '匕首' },
    { icon: '🔪', name: '飞刀' },
  ],
  offhand: [
    { icon: '🛡️', name: '木盾' },
    { icon: '🛡️', name: '铁盾' },
    { icon: '📖', name: '魔法书' },
  ],
  chest: [
    { icon: '🎽', name: '布甲' },
    { icon: '🛡️', name: '皮甲' },
    { icon: '⚔️', name: '锁甲' },
  ],
  cloak: [
    { icon: '🧣', name: '红色披风' },
    { icon: '🧣', name: '蓝色披风' },
  ],
  gloves: [
    { icon: '🧤', name: '皮手套' },
    { icon: '🧤', name: '铁手套' },
  ],
  boots: [
    { icon: '👟', name: '布鞋' },
    { icon: '👢', name: '皮靴' },
  ],
  ring: [
    { icon: '💍', name: '力量戒指' },
    { icon: '💎', name: '智慧戒指' },
  ],
};

// 当前选中的槽位
let currentSlot = null;

// 点击槽位弹出装备选择面板
document.querySelectorAll('.equip-slot').forEach(slot => {
  slot.addEventListener('click', () => {
    const slotType = slot.dataset.slot;
    currentSlot = slotType;
    const slotLabel = slot.dataset.label;
    
    // 更新面板标题
    document.getElementById('popupTitle').textContent = `选择${slotLabel}`;
    
    // 渲染装备列表
    const list = document.getElementById('equipList');
    list.innerHTML = '';
    const items = equipData[slotType] || [];
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'equip-item';
      div.innerHTML = `<span class="equip-item-icon">${item.icon}</span><span class="equip-item-name">${item.name}</span>`;
      div.addEventListener('click', () => {
        // 选中装备
        document.querySelectorAll('.equip-item').forEach(e => e.classList.remove('selected'));
        div.classList.add('selected');
        // 更新槽位图标
        slot.querySelector('.slot-icon').textContent = item.icon;
        slot.classList.add('equipped');
        // 关闭面板
        document.getElementById('equipPopup').classList.remove('active');
      });
      list.appendChild(div);
    });
    
    // 显示面板
    document.getElementById('equipPopup').classList.add('active');
  });
});

// 关闭面板
document.getElementById('popupClose').addEventListener('click', () => {
  document.getElementById('equipPopup').classList.remove('active');
});

// 点击外部关闭
document.addEventListener('click', (e) => {
  const popup = document.getElementById('equipPopup');
  const ring = document.getElementById('equipRing');
  if (!popup.contains(e.target) && !ring.contains(e.target)) {
    popup.classList.remove('active');
  }
});

// 角色切换
document.querySelectorAll('.char-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.char-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    // 这里可以切换角色立绘
  });
});
</script>

</body>
</html>
