<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW风格角色面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a14;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Arial', sans-serif;
}
.game-container {
  width: 900px;
  height: 600px;
  background: #0d0d1a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 60px rgba(79, 172, 254, 0.1);
}

/* === 顶部标签栏 === */
.top-tabs {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 38px;
  background: rgba(0,0,0,0.4);
  border-bottom: 1px solid #1a1a2e;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 4px;
}
.tab {
  padding: 6px 14px;
  color: rgba(255,255,255,0.45);
  font-size: 12px;
  border-radius: 4px 4px 0 0;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.tab.active {
  color: #ffd700;
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.2);
  border-bottom-color: #0d0d1a;
}
.tab:hover:not(.active) { color: rgba(255,255,255,0.7); }

/* === 主面板 === */
.main-panel {
  position: absolute;
  top: 38px; bottom: 0; left: 0; right: 0;
  display: flex;
}

/* === 左侧：人形装备槽区域 === */
.left-area {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 人形轮廓背景（半透明） */
.human-outline {
  position: relative;
  width: 220px;
  height: 400px;
}

.char-model {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}
.char-model img {
  height: 100%;
  width: auto;
  object-fit: contain;
  animation: charIdle 1.5s ease-in-out infinite;
  filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6));
}
@keyframes charIdle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
.char-placeholder {
  width: 80px;
  height: 200px;
  border: 2px dashed rgba(255,255,255,0.1);
  border-radius: 40px;
}

/* 装备槽 - 人形轮廓排列 */
.equip-slot {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  z-index: 2;
}
.slot-box {
  width: 38px;
  height: 38px;
  background: rgba(10,12,20,0.9);
  border: 1.5px solid #2a2a4a;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.15s;
  position: relative;
}
.slot-box:hover {
  border-color: #ffd700;
  background: rgba(255,215,0,0.08);
  transform: scale(1.1);
  z-index: 10;
  box-shadow: 0 0 12px rgba(255,215,0,0.3);
}
.equipped .slot-box {
  border-color: #4a6a8a;
  background: rgba(74,106,138,0.15);
}
.slot-label {
  font-size: 8px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* 人形槽位坐标 */
.slot-head     { top: 0;    left: 50%; transform: translateX(-50%); }
.slot-necklace { top: 52px; left: 50%; transform: translateX(-50%); }
.slot-shoulders{ top: 90px; left: 50%; transform: translateX(-50%); display:flex; gap:20px; }
.slot-shoulder-l { position:absolute; top:0; left:-30px; }
.slot-shoulder-r { position:absolute; top:0; right:-30px; }
.slot-hands   { top: 170px; left: 50%; transform: translateX(-50%); display:flex; gap:28px; }
.slot-hand-l  { position:absolute; top:0; left:-44px; }
.slot-hand-r  { position:absolute; top:0; right:-44px; }
.slot-chest   { top: 130px; left: 50%; transform: translateX(-50%); }
.slot-waist   { top: 195px; left: 50%; transform: translateX(-50%); }
.slot-legs    { top: 230px; left: 50%; transform: translateX(-50%); }
.slot-feet    { bottom: 0; left: 50%; transform: translateX(-50%); }
.slot-weapon  { top: 150px; right: -5px; }
.slot-offhand { top: 150px; left: -5px; }
.slot-back    { top: 100px; left: -5px; }
.slot-finger1 { bottom: 90px; right: -5px; }
.slot-finger2 { bottom: 50px; right: 25px; }
.slot-trinket1{ bottom: 90px; left: -5px; }
.slot-trinket2{ bottom: 50px; left: 25px; }

/* === 右侧：信息面板 === */
.right-area {
  width: 320px;
  border-left: 1px solid #1a1a2e;
  padding: 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
}

.char-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.char-name { color: #ffd700; font-size: 18px; font-weight: bold; }
.char-class { color: #a0a0c0; font-size: 12px; }
.char-level { margin-left: auto; color: #7ec8e3; font-size: 13px; }

.char-subheader {
  display: flex;
  gap: 6px;
  align-items: center;
}
.char-title-tag {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}
.char-mbti-tag {
  background: rgba(255,215,0,0.08);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 10px;
  color: #ffd700;
}

.ilvl-display {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.ilvl-label { color: rgba(255,255,255,0.35); font-size: 11px; }
.ilvl-value { color: #e8e8ff; font-size: 20px; font-weight: bold; }
.ilvl-sub { color: rgba(255,255,255,0.3); font-size: 10px; }

.stats-section {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 6px;
  padding: 10px 12px;
}
.section-title {
  color: rgba(255,255,255,0.3);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.stat-row {
  display: flex;
  align-items: center;
  gap: 5px;
}
.stat-icon {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}
.stat-label { color: rgba(255,255,255,0.4); font-size: 10px; }
.stat-val { color: #e8e8ff; font-size: 11px; font-weight: bold; margin-left: auto; }

.power-section {
  background: rgba(79,172,254,0.04);
  border: 1px solid rgba(79,172,254,0.1);
  border-radius: 6px;
  padding: 10px 12px;
}
.power-label { color: rgba(79,172,254,0.7); font-size: 10px; margin-bottom: 6px; }
.power-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.power-fill { height: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); border-radius: 2px; }

/* === 底部装饰 === */
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #4facfe 30%, #ffd700 50%, #4facfe 70%, transparent);
}

/* === 弹出面板 === */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  z-index: 998;
}
.overlay.active { opacity: 1; pointer-events: auto; }

.popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.92);
  background: rgba(8,10,20,0.97);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 10px;
  padding: 20px 24px;
  min-width: 300px;
  opacity: 0; pointer-events: none;
  transition: all 0.2s;
  z-index: 999;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.08);
}
.popup.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
.popup-name { color: #ffd700; font-size: 17px; font-weight: bold; margin-bottom: 2px; }
.popup-type { color: rgba(255,255,255,0.4); font-size: 11px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.popup-stat { color: #7ec8e3; font-size: 12px; margin-bottom: 4px; }
.popup-desc { color: rgba(255,255,255,0.55); font-size: 11px; line-height: 1.6; margin: 10px 0; }
.popup-btn { width: 100%; padding: 8px; background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.25); border-radius: 6px; color: #ffd700; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.popup-btn:hover { background: rgba(255,215,0,0.15); }
.popup-close { position: absolute; top: 10px; right: 12px; color: rgba(255,255,255,0.3); font-size: 16px; cursor: pointer; }
.popup-close:hover { color: #fff; }
</style>
</head>
<body>

<div class="game-container">

  <!-- 顶部标签 -->
  <div class="top-tabs">
    <div class="tab active">角色</div>
    <div class="tab">属性</div>
    <div class="tab">天赋</div>
    <div class="tab">装备</div>
  </div>

  <div class="main-panel">

    <!-- 左侧：人形轮廓装备槽 -->
    <div class="left-area">
      <div class="human-outline">

        <!-- 角色立绘 -->
        <div class="char-model">
          <img src="mbti_intj_boy_child.png" alt="角色"
               onerror="this.style.display='none'">
        </div>

        <!-- 头部 -->
        <div class="equip-slot slot-head equipped" data-name="战士白板盔" data-type="头部 · 板甲" data-ilvl="12" data-desc="基础战士装备，由新手村铁匠打造。">
          <div class="slot-box">🪖</div>
          <div class="slot-label">头部</div>
        </div>

        <!-- 项链 -->
        <div class="equip-slot slot-necklace equipped" data-name="勇气徽章" data-type="颈部" data-ilvl="15" data-desc="新手村村长的赠礼。">
          <div class="slot-box">📿</div>
          <div class="slot-label">颈部</div>
        </div>

        <!-- 肩部（左右两个） -->
        <div class="equip-slot slot-shoulders">
          <div class="slot-shoulder-l equipped" data-name="见习肩甲" data-type="肩部 · 板甲" data-ilvl="10" data-desc="保护肩膀的入门级铠甲。">
            <div class="slot-box">🎽</div>
            <div class="slot-label">肩</div>
          </div>
          <div class="slot-shoulder-r equipped" data-name="见习肩甲" data-type="肩部 · 板甲" data-ilvl="10" data-desc="保护肩膀的入门级铠甲。">
            <div class="slot-box">🎽</div>
            <div class="slot-label">肩</div>
          </div>
        </div>

        <!-- 胸部 -->
        <div class="equip-slot slot-chest equipped" data-name="战士皮甲" data-type="胸部 · 板甲" data-ilvl="14" data-desc="新手战士的标准护甲。">
          <div class="slot-box">🛡️</div>
          <div class="slot-label">胸部</div>
        </div>

        <!-- 腰部 -->
        <div class="equip-slot slot-waist equipped" data-name="粗制腰带" data-type="腰部 · 皮革" data-ilvl="7" data-desc="扎实的入门级腰带。">
          <div class="slot-box">🎗️</div>
          <div class="slot-label">腰部</div>
        </div>

        <!-- 腿部 -->
        <div class="equip-slot slot-legs equipped" data-name="战士护腿" data-type="腿部 · 板甲" data-ilvl="13" data-desc="覆盖大腿的金属护腿。">
          <div class="slot-box">👖</div>
          <div class="slot-label">腿部</div>
        </div>

        <!-- 脚部 -->
        <div class="equip-slot slot-feet equipped" data-name="训练长靴" data-type="脚部 · 皮革" data-ilvl="9" data-desc="适合新手的轻便战靴。">
          <div class="slot-box">👢</div>
          <div class="slot-label">脚部</div>
        </div>

        <!-- 手部（左右两个） -->
        <div class="equip-slot slot-hands">
          <div class="slot-hand-l equipped" data-name="搏击手套" data-type="手部 · 皮革" data-ilvl="11" data-desc="拳击训练用护手套。">
            <div class="slot-box">🧤</div>
            <div class="slot-label">手</div>
          </div>
          <div class="slot-hand-r equipped" data-name="搏击手套" data-type="手部 · 皮革" data-ilvl="11" data-desc="拳击训练用护手套。">
            <div class="slot-box">🧤</div>
            <div class="slot-label">手</div>
          </div>
        </div>

        <!-- 主手武器 -->
        <div class="equip-slot slot-weapon equipped" data-name="新手短剑" data-type="主手 · 单手剑" data-ilvl="12" data-desc="锋利的新手短剑，14-22伤害。">
          <div class="slot-box">⚔️</div>
          <div class="slot-label">主手</div>
        </div>

        <!-- 副手 -->
        <div class="equip-slot slot-offhand" data-name="未装备" data-type="副手" data-ilvl="0" data-desc="">
          <div class="slot-box">📦</div>
          <div class="slot-label">副手</div>
        </div>

        <!-- 披风 -->
        <div class="equip-slot slot-back equipped" data-name="新手披风" data-type="背部 · 布料" data-ilvl="8" data-desc="保暖的初学者披风。">
          <div class="slot-box">🧣</div>
          <div class="slot-label">背部</div>
        </div>

        <!-- 戒指1 -->
        <div class="equip-slot slot-finger1 equipped" data-name="力量指环" data-type="手指" data-ilvl="10" data-desc="增加少量力量的粗糙戒指。">
          <div class="slot-box">💍</div>
          <div class="slot-label">戒指</div>
        </div>

        <!-- 饰品1 -->
        <div class="equip-slot slot-trinket1 equipped" data-name="战痕勋章" data-type="饰品" data-ilvl="16" data-desc="记录了第一次击杀怪物的荣誉。">
          <div class="slot-box">🏅</div>
          <div class="slot-label">饰品</div>
        </div>

      </div>
    </div>

    <!-- 右侧：角色信息 -->
    <div class="right-area">

      <div class="char-header">
        <div class="char-name">小杰</div>
        <div class="char-class">战士</div>
        <div class="char-level">Lv.8</div>
      </div>

      <div class="char-subheader">
        <div class="char-title-tag">战略大师</div>
        <div class="char-mbti-tag">INTJ</div>
      </div>

      <div class="ilvl-display">
        <div class="ilvl-label">平均装等</div>
        <div class="ilvl-value">284</div>
        <div class="ilvl-sub">/ 315</div>
      </div>

      <div class="stats-section">
        <div class="section-title">基础属性</div>
        <div class="stats-grid">
          <div class="stat-row">
            <div class="stat-icon" style="background:#c44040;">⚔️</div>
            <div class="stat-label">力量</div>
            <div class="stat-val">156</div>
          </div>
          <div class="stat-row">
            <div class="stat-icon" style="background:#4a7fc4;">🛡️</div>
            <div class="stat-label">敏捷</div>
            <div class="stat-val">48</div>
          </div>
          <div class="stat-row">
            <div class="stat-icon" style="background:#7ec87e;">💚</div>
            <div class="stat-label">耐力</div>
            <div class="stat-val">203</div>
          </div>
          <div class="stat-row">
            <div class="stat-icon" style="background:#c4a03a;">⭐</div>
            <div class="stat-label">智力</div>
            <div class="stat-val">32</div>
          </div>
        </div>
      </div>

      <div class="stats-section">
        <div class="section-title">战斗属性</div>
        <div class="stats-grid">
          <div class="stat-row">
            <div class="stat-label">暴击</div>
            <div class="stat-val" style="color:#ffd700; margin-left:auto;">5.2%</div>
          </div>
          <div class="stat-row">
            <div class="stat-label">加速</div>
            <div class="stat-val" style="color:#4facfe; margin-left:auto;">8.1%</div>
          </div>
          <div class="stat-row">
            <div class="stat-label">精通</div>
            <div class="stat-val" style="color:#c44bc4; margin-left:auto;">3.0%</div>
          </div>
          <div class="stat-row">
            <div class="stat-label">全能</div>
            <div class="stat-val" style="color:#e8a84c; margin-left:auto;">1.2%</div>
          </div>
        </div>
      </div>

      <div class="power-section">
        <div class="power-label">综合战斗力</div>
        <div class="power-bar"><div class="power-fill" style="width:68%"></div></div>
      </div>

    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<!-- 弹出详情 -->
<div class="overlay" id="overlay"></div>
<div class="popup" id="popup">
  <div class="popup-close" id="popupClose">✕</div>
  <div class="popup-name" id="popupName">战士白板盔</div>
  <div class="popup-type" id="popupType">头部 · 板甲</div>
  <div class="popup-stat" id="popupIlvl">物品等级 12</div>
  <div class="popup-stat" id="popupStat1">+24 护甲</div>
  <div class="popup-stat" id="popupStat2">+12 力量</div>
  <div class="popup-desc" id="popupDesc">基础战士装备。</div>
  <button class="popup-btn">卸下装备</button>
</div>

<script>
const overlay = document.getElementById('overlay');
const popup = document.getElementById('popup');

document.querySelectorAll('.equip-slot, [data-name]').forEach(el => {
  const slot = el.closest('.equip-slot') || el;
  if (slot.dataset.name === '未装备') return;
  (slot._el || slot).onclick = () => {
    const d = slot.dataset;
    document.getElementById('popupName').textContent = d.name;
    document.getElementById('popupType').textContent = d.type;
    document.getElementById('popupIlvl').textContent = `物品等级 ${d.ilvl}`;
    document.getElementById('popupStat1').textContent = `+${Math.floor(Math.random()*20+8)} 力量`;
    document.getElementById('popupStat2').textContent = `+${Math.floor(Math.random()*10+3)} 耐力`;
    document.getElementById('popupDesc').textContent = d.desc;
    popup.classList.add('active');
    overlay.classList.add('active');
  };
});

document.getElementById('popupClose').onclick = () => { popup.classList.remove('active'); overlay.classList.remove('active'); };
overlay.onclick = () => { popup.classList.remove('active'); overlay.classList.remove('active'); };
</script>

</body>
</html>
