<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent World - WoW风格角色面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a14;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Arial', sans-serif;
}
.game-container {
  width: 1080px;
  height: 660px;
  background: #0d0d1a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 60px rgba(79,172,254,0.1);
}

/* 顶部标签栏 */
.top-tabs {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 38px;
  background: rgba(0,0,0,0.4);
  border-bottom: 1px solid #1a1a2e;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 4px;
  z-index: 10;
}
.tab {
  padding: 6px 14px;
  color: rgba(255,255,255,0.45);
  font-size: 12px;
  border-radius: 4px 4px 0 0;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.tab.active {
  color: #ffd700;
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.2);
  border-bottom-color: #0d0d1a;
}
.tab:hover:not(.active) { color: rgba(255,255,255,0.7); }

/* 主面板 */
.main-panel {
  position: absolute;
  top: 38px; bottom: 0; left: 0; right: 0;
  display: flex;
}

/* ========== 左侧：角色立绘区 ========== */
.left-area {
  flex: 0 0 400px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  /* 背景光晕 */
  background: radial-gradient(ellipse at center, rgba(60,80,160,0.08) 0%, transparent 70%);
}

/* 角色立绘 - 居中显示，占据主要视觉空间 */
.char-portrait {
  position: relative;
  width: 320px;
  height: 520px;
}

.char-portrait img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 480px;
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 30px rgba(100,120,200,0.2));
  animation: charIdle 2s ease-in-out infinite;
  z-index: 1;
}

@keyframes charIdle {
  0%, 100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, calc(-50% - 6px)); }
}

/* 角色名和职业悬浮标签 */
.char-info-badge {
  position: absolute;
  z-index: 5;
  background: rgba(8,10,20,0.85);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 8px;
  padding: 4px 12px;
  text-align: center;
}
.char-info-badge.name {
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
}
.char-info-badge.name .cname { color: #ffd700; font-size: 16px; font-weight: bold; }
.char-info-badge.name .cclass { color: #7ec8e3; font-size: 10px; }
.char-info-badge.mbti {
  bottom: 20px;
  right: -10px;
}
.char-info-badge.mbti .mbti-val { color: #ffd700; font-size: 18px; font-weight: bold; }
.char-info-badge.mbti .mbti-label { color: rgba(255,255,255,0.4); font-size: 9px; }

/* ========== 右侧：信息+装备面板 ========== */
.right-area {
  flex: 1;
  display: flex;
  gap: 0;
  border-left: 1px solid #1a1a2e;
  overflow: hidden;
}

/* 角色属性列 */
.stats-col {
  width: 240px;
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-right: 1px solid #1a1a2e;
  overflow-y: auto;
}
.char-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.char-name { color: #ffd700; font-size: 17px; font-weight: bold; }
.char-class { color: #a0a0c0; font-size: 11px; }
.char-level { margin-left: auto; color: #7ec8e3; font-size: 12px; }
.char-title { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.char-subheader { display: flex; gap: 5px; flex-wrap: wrap; }
.char-tag {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 1px 7px;
  font-size: 9px; color: rgba(255,255,255,0.45);
}
.char-tag.mbti {
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.2);
  color: #ffd700;
}
.ilvl-row { display: flex; align-items: baseline; gap: 5px; }
.ilvl-label { color: rgba(255,255,255,0.3); font-size: 10px; }
.ilvl-val { color: #e8e8ff; font-size: 18px; font-weight: bold; }
.ilvl-max { color: rgba(255,255,255,0.25); font-size: 10px; }
.stats-section {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 5px; padding: 8px 10px;
}
.section-title {
  color: rgba(255,255,255,0.28);
  font-size: 8px; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 7px;
}
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.stat-row { display: flex; align-items: center; gap: 4px; }
.stat-icon {
  width: 12px; height: 12px; border-radius: 2px;
  display: flex; align-items: center; justify-content: center; font-size: 8px;
}
.stat-label { color: rgba(255,255,255,0.38); font-size: 9px; }
.stat-val { color: #e8e8ff; font-size: 10px; font-weight: bold; margin-left: auto; }
.power-section {
  background: rgba(79,172,254,0.04);
  border: 1px solid rgba(79,172,254,0.1);
  border-radius: 5px; padding: 8px 10px;
}
.power-label { color: rgba(79,172,254,0.65); font-size: 9px; margin-bottom: 5px; }
.power-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.power-fill { height: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); border-radius: 2px; }

/* ========== 装备列 ========== */
.equip-col {
  flex: 1;
  padding: 14px 12px;
  overflow-y: auto;
}
.equip-col-title {
  color: rgba(255,255,255,0.25);
  font-size: 8px; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 10px;
}

/* 装备网格 - 简洁的两列布局 */
.equip-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.equip-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
}
.slot-box {
  width: 44px;
  height: 44px;
  background: rgba(10,12,20,0.9);
  border: 1.5px solid #2a2a4a;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.15s;
}
.slot-box:hover {
  border-color: #ffd700;
  background: rgba(255,215,0,0.08);
  transform: scale(1.1);
  box-shadow: 0 0 12px rgba(255,215,0,0.3);
}
.equipped .slot-box {
  border-color: #4a6a8a;
  background: rgba(74,106,138,0.15);
}
.slot-label {
  font-size: 7px;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.equipped .slot-label { color: rgba(255,255,255,0.5); }

/* 底部装饰 */
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #4facfe 30%, #ffd700 50%, #4facfe 70%, transparent);
}

/* 弹出面板 */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s; z-index: 998;
}
.overlay.active { opacity: 1; pointer-events: auto; }
.popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.92);
  background: rgba(8,10,20,0.97);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 10px; padding: 20px 24px;
  min-width: 300px;
  opacity: 0; pointer-events: none;
  transition: all 0.2s; z-index: 999;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.08);
}
.popup.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
.popup-name { color: #ffd700; font-size: 17px; font-weight: bold; margin-bottom: 2px; }
.popup-type { color: rgba(255,255,255,0.4); font-size: 11px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.popup-stat { color: #7ec8e3; font-size: 12px; margin-bottom: 4px; }
.popup-desc { color: rgba(255,255,255,0.55); font-size: 11px; line-height: 1.6; margin: 10px 0; }
.popup-btn {
  width: 100%; padding: 8px;
  background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.25);
  border-radius: 6px; color: #ffd700; font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.popup-btn:hover { background: rgba(255,215,0,0.15); }
.popup-close { position: absolute; top: 10px; right: 12px; color: rgba(255,255,255,0.3); font-size: 16px; cursor: pointer; }
.popup-close:hover { color: #fff; }
</style>
</head>
<body>

<div class="game-container">

  <!-- 顶部标签 -->
  <div class="top-tabs">
    <div class="tab active">角色</div>
    <div class="tab">属性</div>
    <div class="tab">天赋</div>
    <div class="tab">装备</div>
  </div>

  <div class="main-panel">

    <!-- 左侧：角色立绘 -->
    <div class="left-area">
      <div class="char-portrait">
        <!-- 角色立绘 - 真实图片 -->
        <img src="char_warrior_intj.png" alt="战士"
             onerror="this.style.display='none'">

        <!-- 角色信息标签 -->
        <div class="char-info-badge name">
          <div class="cname">小杰</div>
          <div class="cclass">🛡️ 战士</div>
        </div>
        <div class="char-info-badge mbti">
          <div class="mbti-val">INTJ</div>
          <div class="mbti-label">战略大师</div>
        </div>
      </div>
    </div>

    <!-- 右侧 -->
    <div class="right-area">

      <!-- 角色属性 -->
      <div class="stats-col">
        <div class="char-header">
          <div class="char-name">小杰</div>
          <div class="char-class">战士</div>
          <div class="char-level">Lv.8</div>
        </div>
        <div class="char-subheader">
          <div class="char-tag mbti">INTJ</div>
          <div class="char-tag">战略大师</div>
          <div class="char-tag">研究生</div>
        </div>
        <div class="ilvl-row">
          <div class="ilvl-label">平均装等</div>
          <div class="ilvl-val">284</div>
          <div class="ilvl-max">/ 315</div>
        </div>
        <div class="stats-section">
          <div class="section-title">基础属性</div>
          <div class="stats-grid">
            <div class="stat-row"><div class="stat-icon" style="background:#c44040;">⚔️</div><div class="stat-label">力量</div><div class="stat-val">156</div></div>
            <div class="stat-row"><div class="stat-icon" style="background:#4a7fc4;">🛡️</div><div class="stat-label">敏捷</div><div class="stat-val">48</div></div>
            <div class="stat-row"><div class="stat-icon" style="background:#7ec87e;">💚</div><div class="stat-label">耐力</div><div class="stat-val">203</div></div>
            <div class="stat-row"><div class="stat-icon" style="background:#c4a03a;">⭐</div><div class="stat-label">智力</div><div class="stat-val">32</div></div>
          </div>
        </div>
        <div class="stats-section">
          <div class="section-title">战斗属性</div>
          <div class="stats-grid">
            <div class="stat-row"><div class="stat-label">暴击</div><div class="stat-val" style="color:#ffd700;margin-left:auto;">5.2%</div></div>
            <div class="stat-row"><div class="stat-label">加速</div><div class="stat-val" style="color:#4facfe;margin-left:auto;">8.1%</div></div>
            <div class="stat-row"><div class="stat-label">精通</div><div class="stat-val" style="color:#c44bc4;margin-left:auto;">3.0%</div></div>
            <div class="stat-row"><div class="stat-label">全能</div><div class="stat-val" style="color:#e8a84c;margin-left:auto;">1.2%</div></div>
          </div>
        </div>
        <div class="power-section">
          <div class="power-label">综合战斗力</div>
          <div class="power-bar"><div class="power-fill" style="width:68%"></div></div>
        </div>
      </div>

      <!-- 装备网格 -->
      <div class="equip-col">
        <div class="equip-col-title">装备</div>
        <div class="equip-grid">
          <!-- 第1行 -->
          <div class="equip-slot equipped" data-name="战士白板盔" data-type="头部 · 板甲" data-ilvl="12" data-desc="基础战士装备，由新手村铁匠打造。">
            <div class="slot-box">🪖</div><div class="slot-label">头部</div>
          </div>
          <div class="equip-slot equipped" data-name="勇气徽章" data-type="颈部" data-ilvl="15" data-desc="新手村村长的赠礼。">
            <div class="slot-box">📿</div><div class="slot-label">颈部</div>
          </div>
          <div class="equip-slot equipped" data-name="见习肩甲" data-type="肩部 · 板甲" data-ilvl="10" data-desc="保护肩膀的入门级铠甲。">
            <div class="slot-box">🎽</div><div class="slot-label">肩部</div>
          </div>
          <div class="equip-slot equipped" data-name="战士皮甲" data-type="胸部 · 板甲" data-ilvl="14" data-desc="新手战士的标准护甲。">
            <div class="slot-box">🛡️</div><div class="slot-label">胸部</div>
          </div>
          <!-- 第2行 -->
          <div class="equip-slot equipped" data-name="粗制腰带" data-type="腰部 · 皮革" data-ilvl="7" data-desc="扎实耐用的入门级腰带。">
            <div class="slot-box">🎗️</div><div class="slot-label">腰部</div>
          </div>
          <div class="equip-slot equipped" data-name="战士护腿" data-type="腿部 · 板甲" data-ilvl="13" data-desc="覆盖大腿的金属护腿。">
            <div class="slot-box">👖</div><div class="slot-label">腿部</div>
          </div>
          <div class="equip-slot equipped" data-name="训练长靴" data-type="脚部 · 皮革" data-ilvl="9" data-desc="适合新手的轻便战靴。">
            <div class="slot-box">👢</div><div class="slot-label">脚部</div>
          </div>
          <div class="equip-slot equipped" data-name="搏击手套" data-type="手部 · 皮革" data-ilvl="11" data-desc="拳击训练用护手套。">
            <div class="slot-box">🧤</div><div class="slot-label">手部</div>
          </div>
          <!-- 第3行 -->
          <div class="equip-slot equipped" data-name="新手短剑" data-type="主手 · 单手剑" data-ilvl="12" data-desc="锋利的新手短剑，14-22伤害。">
            <div class="slot-box">⚔️</div><div class="slot-label">主手</div>
          </div>
          <div class="equip-slot" data-name="未装备" data-type="副手" data-ilvl="0" data-desc="">
            <div class="slot-box">📦</div><div class="slot-label">副手</div>
          </div>
          <div class="equip-slot equipped" data-name="新手披风" data-type="背部 · 布料" data-ilvl="8" data-desc="保暖的初学者披风。">
            <div class="slot-box">🧣</div><div class="slot-label">披风</div>
          </div>
          <div class="equip-slot equipped" data-name="力量指环" data-type="手指" data-ilvl="10" data-desc="增加少量力量的粗糙戒指。">
            <div class="slot-box">💍</div><div class="slot-label">戒指</div>
          </div>
          <!-- 第4行 -->
          <div class="equip-slot equipped" data-name="敏捷指环" data-type="手指" data-ilvl="10" data-desc="增加少量敏捷的入门戒指。">
            <div class="slot-box">💍</div><div class="slot-label">戒指</div>
          </div>
          <div class="equip-slot equipped" data-name="战痕勋章" data-type="饰品" data-ilvl="16" data-desc="记录了第一次击杀怪物的荣誉。">
            <div class="slot-box">🏅</div><div class="slot-label">饰品</div>
          </div>
          <div class="equip-slot equipped" data-name="力量护符" data-type="饰品" data-ilvl="14" data-desc="增加少量力量的入门饰品。">
            <div class="slot-box">🔮</div><div class="slot-label">饰品</div>
          </div>
          <div class="equip-slot" data-name="未装备" data-type="项链" data-ilvl="0" data-desc="">
            <div class="slot-box">📦</div><div class="slot-label">空</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<!-- 弹出面板 -->
<div class="overlay" id="overlay"></div>
<div class="popup" id="popup">
  <div class="popup-close" onclick="closePopup()">✕</div>
  <div class="popup-name" id="popup-name">装备名</div>
  <div class="popup-type" id="popup-type">类型</div>
  <div class="popup-stat" id="popup-stat"></div>
  <div class="popup-desc" id="popup-desc"></div>
  <button class="popup-btn" onclick="closePopup()">确定</button>
</div>

<script>
document.querySelectorAll('.equip-slot').forEach(slot => {
  slot.addEventListener('click', () => {
    const name = slot.dataset.name || '空装备槽';
    const type = slot.dataset.type || '';
    const ilvl = slot.dataset.ilvl || '0';
    const desc = slot.dataset.desc || '';
    document.getElementById('popup-name').textContent = name;
    document.getElementById('popup-type').textContent = ilvl > 0 ? `${type} · ilvl ${ilvl}` : '空装备槽';
    document.getElementById('popup-stat').textContent = ilvl > 0 ? `装等: ${ilvl}` : '请装备物品';
    document.getElementById('popup-desc').textContent = desc;
    document.getElementById('overlay').classList.add('active');
    document.getElementById('popup').classList.add('active');
  });
});
function closePopup() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('popup').classList.remove('active');
}
document.getElementById('overlay').addEventListener('click', closePopup);
</script>

</body>
</html>
